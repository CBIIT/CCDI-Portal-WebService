# Build + push the backend image and update versions.yaml in
# CBIIT/ccdi-hub-deployments. Replaces BuildBackend.jenkinsfile.
#
# Place this file at .github/workflows/build-backend.yml in the
# CBIIT/CCDI-Portal-WebService repo. See README.md for required secrets.

name: Build backend

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (controls which AWS account + bento/hub/<env> secret is used)'
        type: choice
        default: dev
        options:
          - dev
          - qa
          - sandbox
          - stage
          - prod
      code_branch:
        description: 'Branch / tag of this repo to build (default: branch the workflow was triggered from)'
        required: false
        default: ''
      update_deployment_version:
        description: 'Commit the new image tag to versions.yaml in ccdi-hub-deployments'
        type: boolean
        default: true
      run_deploy_stage:
        description: 'Trigger manual-deploy.yml in ccdi-hub-deployments after a successful build'
        type: boolean
        default: false

run-name: build-backend ${{ inputs.code_branch || github.ref_name }} → ${{ inputs.environment }}

env:
  SERVICE: backend
  ECR_REPO: ccdi-hub-backend
  IMAGE_ENV_VAR: BACKEND_IMAGE

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Determine branch + image tag
        id: tag
        run: |
          BRANCH="${{ inputs.code_branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${{ github.head_ref || github.ref_name }}"
          fi
          IMAGE_TAG="${BRANCH}.${{ github.run_number }}"
          echo "branch=$BRANCH"   >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Building $ECR_REPO:$IMAGE_TAG"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.branch }}
          submodules: recursive
          fetch-depth: 0

      - name: AWS OIDC authentication
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: gha-build-${{ env.SERVICE }}

      - name: Look up ECR account from bento/hub/<env>
        id: ecr-acct
        run: |
          ECR_ACCT=$(aws secretsmanager get-secret-value \
            --region "${{ secrets.AWS_REGION }}" \
            --secret-id "bento/hub/${{ inputs.environment }}" \
            --query SecretString --output text | jq -r '.ecr_account')
          if [ -z "$ECR_ACCT" ] || [ "$ECR_ACCT" = "null" ]; then
            echo "::error::ecr_account not found in bento/hub/${{ inputs.environment }}"
            exit 1
          fi
          echo "ecr_account=$ECR_ACCT" >> "$GITHUB_OUTPUT"
          echo "repo_url=$ECR_ACCT.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$ECR_REPO" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ steps.ecr-acct.outputs.ecr_account }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ steps.ecr-acct.outputs.repo_url }}:${{ steps.tag.outputs.image_tag }}

  update-versions:
    name: Update versions.yaml in ccdi-hub-deployments
    needs: build
    if: ${{ inputs.update_deployment_version }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout ccdi-hub-deployments
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DEPLOYMENTS_REPO || 'CBIIT/ccdi-hub-deployments' }}
          ref: ${{ vars.DEPLOYMENTS_BRANCH || 'main' }}
          token: ${{ secrets.DEPLOYMENTS_REPO_PAT }}
          path: deployments

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Update versions.yaml
        working-directory: deployments
        env:
          BACKEND_IMAGE: ${{ needs.build.outputs.image_tag }}
        run: |
          python3 scripts/writeYML.py versions.yaml
          echo "--- versions.yaml after update ---"
          cat versions.yaml

      - name: Commit & push
        working-directory: deployments
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet versions.yaml; then
            echo "versions.yaml unchanged — skipping commit."
            exit 0
          fi
          git add versions.yaml
          git commit -m "Bump backend to ${{ needs.build.outputs.image_tag }} (built from ${{ github.repository }}@${{ github.sha }})"
          git push origin "${{ vars.DEPLOYMENTS_BRANCH || 'main' }}"

  trigger-deploy:
    name: Trigger deployment workflow
    needs: [build, update-versions]
    if: ${{ inputs.run_deploy_stage && (needs.update-versions.result == 'success' || needs.update-versions.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Dispatch manual-deploy.yml in ccdi-hub-deployments
        env:
          GH_TOKEN: ${{ secrets.DEPLOYMENTS_REPO_PAT }}
          DEPLOY_REPO: ${{ vars.DEPLOYMENTS_REPO || 'CBIIT/ccdi-hub-deployments' }}
          DEPLOY_BRANCH: ${{ vars.DEPLOYMENTS_BRANCH || 'main' }}
        run: |
          gh workflow run manual-deploy.yml \
            --repo "$DEPLOY_REPO" \
            --ref  "$DEPLOY_BRANCH" \
            --field environment=${{ inputs.environment }} \
            --field backend_image=${{ needs.build.outputs.image_tag }} \
            --field cdk_command=deploy

  notify:
    name: Slack notification
    needs: [build, update-versions, trigger-deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate status
        id: agg
        run: |
          for r in "${{ needs.build.result }}" "${{ needs.update-versions.result }}" "${{ needs.trigger-deploy.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "status=failure" >> "$GITHUB_OUTPUT"; exit 0
            fi
          done
          echo "status=success" >> "$GITHUB_OUTPUT"
      - name: Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: act10ns/slack@v1
        with:
          status: ${{ steps.agg.outputs.status }}
          message: |
            backend build → ${{ inputs.environment }}
            Tag: ${{ needs.build.outputs.image_tag }}
            Build: ${{ needs.build.result }} · Versions: ${{ needs.update-versions.result }} · Deploy: ${{ needs.trigger-deploy.result }}
