name: Run Unit Tests

on:
  pull_request:
    branches:
      - main
      - develop
      - '*.*.*'
  push:
    branches:
      - main
      - develop
      - '*.*.*'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Maven and Java setup
        run: |
          mvn --version
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: List source files
        run: |
          echo "Java source files count:"
          find src/main/java -name "*.java" | wc -l
          echo ""
          echo "Source structure:"
          find src/main/java -name "*.java" | head -20

      - name: Clean and compile
        run: mvn clean compile -e -X 2>&1 | tail -200
        continue-on-error: true

      - name: Run tests with Maven
        run: mvn test -Dmaven.test.failure.ignore=true
        continue-on-error: true

      - name: Publish test results
        if: always()
        run: |
          if [ -d "target/surefire-reports" ]; then
            echo "Test reports found:"
            ls -la target/surefire-reports/
            echo ""
            echo "Test Summary:"
            cat target/surefire-reports/*.txt 2>/dev/null || echo "No text reports"
          else
            echo "No test reports directory found"
          fi

      - name: Check compilation output
        if: always()
        run: |
          if [ -d "target/classes/gov/nih/nci/bento" ]; then
            echo "Compiled classes found:"
            find target/classes -name "*.class" | wc -l
          else
            echo "No compiled classes found"
          fi
