name: Run Tests

on:
  pull_request:
    branches:
      - main
      - '*.*.*'
  push:
    branches:
      - main
      - '*.*.*'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn clean test -Dspring.profiles.active=test

      - name: Check for test reports
        id: check-reports
        if: always()
        run: |
          if [ -d "target/surefire-reports" ] && [ -n "$(find target/surefire-reports -name '*.xml' 2>/dev/null)" ]; then
            echo "reports_exist=true" >> $GITHUB_OUTPUT
            echo "Test reports found"
          else
            echo "reports_exist=false" >> $GITHUB_OUTPUT
            echo "No test reports found"
          fi

      - name: Publish test results
        if: always() && steps.check-reports.outputs.reports_exist == 'true'
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

